services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-bank-postgres
    environment:
      POSTGRES_DB: digital_bank
      POSTGRES_USER: digital_bank
      POSTGRES_PASSWORD: digital_bank
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digital_bank -d digital_bank"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
